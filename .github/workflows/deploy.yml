name: Deploy VitePress site to Pages

on:
  # Runs on pushes targeting the default branch
  push:
    branches: [main] # Change to [master] if your default branch is named master

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # Build job
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Not required, but recommended for lastUpdated plugin inside VitePress

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: bun # Can change to pnpm / yarn / bun depending on your project

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Install dependencies
        run: npm ci # Uses clean installation matching your package-lock.json

      - name: Build with VitePress
        run: npm run docs:build # Change this if your package.json build command differs

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Points to VitePress distribution output directory. 
          # Change to '.vitepress/dist' if your project is at the root directory rather than inside a '/docs' subfolder.
          path: .vitepress/dist 

  # Deployment job
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
